# =============================================================================
# docker-compose.dev.yml — Ethan OS (Development Extension)
# =============================================================================
#
# Services additionnels pour le développement :
#   - Redis (cache, événements)
#   - PostgreSQL (base de données)
#   - Qdrant (vector store)
#   - ChromaDB (vector store alternatif)
#   - Ollama (LLM local)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Note: Ces services sont optionnels et peuvent être désactivés via .env
# =============================================================================

services:
  # ===========================================================================
  # Redis — Cache, événements, mémoire court-terme
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: ethan-redis
    hostname: redis
    networks:
      - ethan-network
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    environment:
      - REDIS_PERSISTENCE=${REDIS_PERSISTENCE:-false}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    command: >
      sh -c '
        if [ "${REDIS_PERSISTENCE}" = "true" ]; then
          redis-server --appendonly yes --save 60 1
        else
          redis-server --save "" --appendonly no
        fi
      '
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # PostgreSQL — Base de données structurée
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: ethan-postgres
    hostname: postgres
    networks:
      - ethan-network
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ethan}
      - POSTGRES_USER=${POSTGRES_USER:-ethan}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ethan} -d ${POSTGRES_DB:-ethan}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Qdrant — Vector database (production)
  # ===========================================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ethan-qdrant
    hostname: qdrant
    networks:
      - ethan-network
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # ChromaDB — Vector store alternatif (développement)
  # ===========================================================================
  chromadb:
    image: chromadb/chroma:latest
    container_name: ethan-chromadb
    hostname: chromadb
    networks:
      - ethan-network
    ports:
      - "${CHROMADB_PORT:-8000}:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
      - CHROMA_SERVER_CORS_ALLOW_ORIGINS=*
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Ollama — LLM local
  # ===========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ethan-ollama
    hostname: ollama
    networks:
      - ethan-network
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-models:/root/.ollama
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
      - OLLAMA_DEBUG=${OLLAMA_DEBUG:-0}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    # GPU Support (NVIDIA) — uncomment for GPU passthrough:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Volumes additionnels ──────────────────────────────────────────────────────
volumes:
  redis-data:
    name: ethan-redis-data
  postgres-data:
    name: ethan-postgres-data
  qdrant-data:
    name: ethan-qdrant-data
  chromadb-data:
    name: ethan-chromadb-data
  ollama-models:
    name: ethan-ollama-models