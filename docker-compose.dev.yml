# =============================================================================
# docker-compose.dev.yml — Ethan Développement (Racine)
# =============================================================================
#
# Mode développement avec hot reload.
# Référence les Dockerfiles existants dans deploy/docker/ sans les modifier.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#
# Features:
#   - Hot reload backend (uvicorn --reload)
#   - Hot reload frontend (Vite dev server)
#   - Volumes montés pour code live
#   - Logs détaillés (debug)
#   - Debug port 5678
#
# Voir aussi:
#   - deploy/docker/docker-compose.dev.yml : Version complète
#   - docker-compose.yml                   : Version production (racine)
# =============================================================================

networks:
  jarvis-network:
    name: jarvis-network
    driver: bridge

volumes:
  jarvis-config:
    name: jarvis-config-dev
  jarvis-logs:
    name: jarvis-logs-dev
  jarvis-workspace:
    name: jarvis-workspace-dev
  jarvis-memory:
    name: jarvis-memory-dev
  jarvis-uploads:
    name: jarvis-uploads-dev
  jarvis-cache:
    name: jarvis-cache-dev
  jarvis-models:
    name: jarvis-models-dev
  ollama-models:
    name: ollama-models-dev

services:
  # ===========================================================================
  # Backend — Hot Reload
  # Utilise le Dockerfile existant (stage python-builder) + volumes montés
  # ===========================================================================
  backend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.backend
      target: python-builder
    image: openjarvis/backend:dev
    container_name: openjarvis-backend-dev
    networks:
      - jarvis-network
    ports:
      - "${OPENJARVIS_PORT:-8000}:8000"
      - "5678:5678"
    environment:
      - OPENJARVIS_API_KEY=${OPENJARVIS_API_KEY:-dev-key-change-me}
      - OPENJARVIS_HOME=/etc/openjarvis
      - OPENJARVIS_CONFIG=/etc/openjarvis/config.toml
      - OPENJARVIS_LOG_LEVEL=${OPENJARVIS_LOG_LEVEL:-debug}
      - OPENJARVIS_DEV_MODE=true
      - OPENJARVIS_ENGINE_DEFAULT=${OPENJARVIS_ENGINE_DEFAULT:-ollama}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENJARVIS_DATABASE_URL=${OPENJARVIS_DATABASE_URL:-sqlite:////var/lib/openjarvis/memory/openjarvis.db}
      - OPENJARVIS_WORKSPACE=/workspace
      - OPENJARVIS_UPLOADS=/var/lib/openjarvis/uploads
      - OPENJARVIS_CACHE=/var/lib/openjarvis/cache
      - OPENJARVIS_MODELS=/var/lib/openjarvis/models
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONDEVMODE=1
    volumes:
      # Code source monté pour hot reload
      - ./src:/app/src
      - ./configs:/etc/openjarvis:ro
      - ./pyproject.toml:/app/pyproject.toml
      - ./README.md:/app/README.md
      # Volumes persistants
      - jarvis-logs:/var/log/openjarvis
      - jarvis-workspace:/workspace
      - jarvis-memory:/var/lib/openjarvis/memory
      - jarvis-uploads:/var/lib/openjarvis/uploads
      - jarvis-cache:/var/lib/openjarvis/cache
      - jarvis-models:/var/lib/openjarvis/models
    depends_on:
      ollama:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    command: ["serve", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Frontend — Vite Dev Server
  # ===========================================================================
  frontend:
    image: node:22-slim
    container_name: openjarvis-frontend-dev
    networks:
      - jarvis-network
    ports:
      - "${VITE_PORT:-5173}:5173"
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000/ws
      - NODE_ENV=development
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Ollama — Inférence LLM Locale
  # ===========================================================================
  # ===========================================================================
  # PostgreSQL — Base de données principale (dev)
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: openjarvis-postgres-dev
    networks:
      - jarvis-network
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-openjarvis}
      - POSTGRES_USER=${POSTGRES_USER:-openjarvis}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openjarvis} -d ${POSTGRES_DB:-openjarvis}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # ChromaDB — Base vectorielle (dev)
  # ===========================================================================
  chromadb:
    image: chromadb/chroma:latest
    container_name: openjarvis-chromadb-dev
    networks:
      - jarvis-network
    ports:
      - "${CHROMADB_PORT:-8000}:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
      - CHROMA_SERVER_CORS_ALLOW_ORIGINS=*
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Qdrant — Base vectorielle (production, optionnel)
  # ===========================================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: openjarvis-qdrant-dev
    networks:
      - jarvis-network
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Redis — Cache & Mémoire Courte Agent (dev)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: openjarvis-redis-dev
    networks:
      - jarvis-network
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    environment:
      - REDIS_PERSISTENCE=${REDIS_PERSISTENCE:-false}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    command: >
      sh -c '
        if [ "${REDIS_PERSISTENCE}" = "true" ]; then
          redis-server --appendonly yes --save 60 1
        else
          redis-server --save "" --appendonly no
        fi
      '
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    image: ollama/ollama:latest
    container_name: openjarvis-ollama-dev
    networks:
      - jarvis-network
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-24h}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-4}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-3}
      - OLLAMA_DEBUG=${OLLAMA_DEBUG:-1}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"