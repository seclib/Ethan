# =============================================================================
# Prometheus — Règles d'alerte
# =============================================================================
# Alertes pour Ethan

groups:
  - name: openjarvis_alerts
    interval: 30s
    rules:
      # ─── Backend ───────────────────────────────────────────────────
      - alert: BackendDown
        expr: up{job="openjarvis-backend"} == 0
        for: 1m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "Backend Ethan indisponible"
          description: "Le backend n'est pas accessible depuis {{ $labels.instance }}"

      - alert: BackendHighLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="openjarvis-backend"}[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "Latence backend élevée"
          description: "P95 latency > 1s sur {{ $labels.instance }}"

      - alert: BackendHighErrorRate
        expr: sum(rate(http_requests_total{job="openjarvis-backend",status=~"5.."}[5m])) / sum(rate(http_requests_total{job="openjarvis-backend"}[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "Taux d'erreur backend élevé"
          description: "Plus de 5% de requêtes en erreur 5xx"

      # ─── Traefik ───────────────────────────────────────────────────
      - alert: TraefikDown
        expr: up{job="traefik"} == 0
        for: 1m
        labels:
          severity: critical
          service: traefik
        annotations:
          summary: "Traefik indisponible"
          description: "Le reverse proxy n'est pas accessible"

      - alert: TraefikHighLatency
        expr: histogram_quantile(0.95, sum(rate(traefik_service_request_duration_seconds_bucket[5m])) by (le)) > 0.5
        for: 5m
        labels:
          severity: warning
          service: traefik
        annotations:
          summary: "Latence Traefik élevée"
          description: "P95 latency > 500ms"

      # ─── Redis ─────────────────────────────────────────────────────
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis indisponible"
          description: "Redis n'est pas accessible"

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis mémoire élevée"
          description: "Utilisation mémoire > 90%"

      # ─── PostgreSQL ────────────────────────────────────────────────
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL indisponible"
          description: "PostgreSQL n'est pas accessible"

      - alert: PostgresHighConnections
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL connexions élevées"
          description: "Plus de 80% des connexions utilisées"

      # ─── Ollama ───────────────────────────────────────────────────
      - alert: OllamaDown
        expr: up{job="ollama"} == 0
        for: 2m
        labels:
          severity: warning
          service: ollama
        annotations:
          summary: "Ollama indisponible"
          description: "Le service Ollama n'est pas accessible"

      # ─── Système ───────────────────────────────────────────────────
      - alert: HighCPU
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "CPU élevé"
          description: "Utilisation CPU > 80% sur {{ $labels.instance }}"

      - alert: HighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "Mémoire élevée"
          description: "Utilisation RAM > 85% sur {{ $labels.instance }}"

      - alert: HighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 90
        for: 5m
        labels:
          severity: critical
          service: system
        annotations:
          summary: "Disque presque plein"
          description: "Utilisation disque > 90% sur {{ $labels.instance }}"