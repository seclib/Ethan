# ETHAN Backend Services (production)
# Managed by: ethan-runtime
# CLI runs on host, NEVER in Docker

services:
  # ── Infrastructure ───────────────────────────────────────────────
  nats:
    image: nats:2-alpine
    container_name: ethan-nats
    ports:
      - "4222:4222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4222"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - ethan-backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.5'

  redis:
    image: redis:7-alpine
    container_name: ethan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - ethan-backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  postgres:
    image: postgres:16-alpine
    container_name: ethan-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ethan
      POSTGRES_USER: ethan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ethan}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ethan"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ethan-backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '2.0'

  # ── Core AI Engine ─────────────────────────────────────────────────
  ethan-core:
    build:
      context: ../../core
      dockerfile: ../infrastructure/docker/core/Dockerfile
    image: ethan/core:latest
    container_name: ethan-core
    ports:
      - "8000:8000"
      - "50051:50051"
    environment:
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379/0
      POSTGRES_URL: postgres://ethan:${POSTGRES_PASSWORD:-ethan}@postgres:5432/ethan
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ethan-backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '4.0'

  # ── Plugin Executor ────────────────────────────────────────────────
  ethan-plugins:
    build:
      context: ../../plugins
      dockerfile: ../infrastructure/docker/plugins/Dockerfile
    image: ethan/plugins:latest
    container_name: ethan-plugins
    environment:
      NATS_URL: nats://nats:4222
      CORE_GRPC_URL: ethan-core:50051
    depends_on:
      nats:
        condition: service_healthy
      ethan-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ethan-backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '2.0'

volumes:
  nats-data:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local

networks:
  ethan-backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.name: ethan0