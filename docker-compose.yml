# =============================================================================
# docker-compose.yml — Ethan OS (Baseline)
# =============================================================================
#
# Architecture de base pour Ethan OS.
# Services core uniquement : backend + frontend.
#
# Usage:
#   cp .env.example .env
#   docker compose up --build
#
# Extensions:
#   - docker-compose.dev.yml   : Services data/AI (redis, postgres, ollama, etc.)
#   - docker-compose.prod.yml  : Monitoring (prometheus, grafana, traefik)
#
# Exemples:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# =============================================================================

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  ethan-network:
    name: ethan-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  # Core application data
  ethan-logs:
    name: ethan-logs
  ethan-config:
    name: ethan-config
  ethan-cache:
    name: ethan-cache
  ethan-workspace:
    name: ethan-workspace
  # AI infrastructure volumes
  redis-data:
    name: redis-data
  postgres-data:
    name: postgres-data
  qdrant-data:
    name: qdrant-data
  ollama-models:
    name: ollama-models

# ── Services ──────────────────────────────────────────────────────────────────
services:
  # ===========================================================================
  # Backend — Ethan API (FastAPI + Rust)
  # ===========================================================================
  backend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.backend
    image: ethan/backend:latest
    container_name: ethan-backend
    hostname: backend
    networks:
      - ethan-network
    ports:
      - "${ETHAN_PORT:-8000}:8000"
    environment:
      # Core
      - ETHAN_API_KEY=${ETHAN_API_KEY:?ETHAN_API_KEY is required}
      - ETHAN_HOME=/etc/ethan
      - ETHAN_CONFIG=/etc/ethan/config.toml
      - ETHAN_LOG_LEVEL=${ETHAN_LOG_LEVEL:-info}
      - ETHAN_DEV_MODE=${ETHAN_DEV_MODE:-false}

      # Engine
      - ETHAN_ENGINE_DEFAULT=${ETHAN_ENGINE_DEFAULT:-ollama}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://localhost:11434}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}

      # Database
      - ETHAN_DATABASE_URL=${ETHAN_DATABASE_URL:-sqlite:////var/lib/ethan/memory/ethan.db}

      # Paths
      - ETHAN_WORKSPACE=/workspace
      - ETHAN_UPLOADS=/var/lib/ethan/uploads
      - ETHAN_CACHE=/var/lib/ethan/cache
      - ETHAN_MODELS=/var/lib/ethan/models
    volumes:
      - ethan-config:/etc/ethan:ro
      - ethan-logs:/var/log/ethan
      - ethan-workspace:/workspace
      - ethan-cache:/var/lib/ethan/cache
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Frontend — Interface Web (Nginx)
  # ===========================================================================
  frontend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.frontend
    image: ethan/frontend:latest
    container_name: ethan-frontend
    hostname: frontend
    networks:
      - ethan-network
    ports:
      - "${NGINX_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  # ==========================================================================
  # Redis — Cache, événements, mémoire court-terme
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: ethan-redis
    hostname: redis
    networks:
      - ethan-network
    # Pas de port exposé publiquement – uniquement interne
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    environment:
      - REDIS_PERSISTENCE=${REDIS_PERSISTENCE:-false}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  # ==========================================================================
  # PostgreSQL — Base de données structurée
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: ethan-postgres
    hostname: postgres
    networks:
      - ethan-network
    # Pas de port exposé publiquement – uniquement interne
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ethan}
      - POSTGRES_USER=${POSTGRES_USER:-ethan}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ethan} -d ${POSTGRES_DB:-ethan}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  # ==========================================================================
  # Qdrant — Vector database (production)
  # ==========================================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ethan-qdrant
    hostname: qdrant
    networks:
      - ethan-network
    # Pas de port exposé publiquement – uniquement interne
    # ports:
    #   - "${QDRANT_PORT:-6333}:6333"
    #   - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "grep -q '00000000:18BD' /proc/net/tcp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  # ==========================================================================
  # Ollama — LLM local
  # ==========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ethan-ollama
    hostname: ollama
    networks:
      - ethan-network
    # Pas de port exposé publiquement – uniquement interne
    # ports:
    #   - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-models:/root/.ollama
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
      - OLLAMA_DEBUG=${OLLAMA_DEBUG:-0}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"