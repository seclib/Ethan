version: "3.8"

services:
  nats:
    image: nats:2.10-alpine
    container_name: ethan-nats
    ports:
      - "4222:4222"     # Client
      - "8222:8222"     # HTTP management
      - "6222:6222"     # Cluster
    command: ["-js"]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4222"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ethan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: ethan-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ethan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ethan_dev_pass}
      POSTGRES_DB: ethan
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ethan"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    container_name: ethan-api
    ports:
      - "8000:8000"
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://ethan:${POSTGRES_PASSWORD:-ethan_dev_pass}@postgres:5432/ethan
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  kernel:
    build:
      context: .
      dockerfile: deploy/Dockerfile.kernel
    container_name: ethan-kernel
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://ethan:${POSTGRES_PASSWORD:-ethan_dev_pass}@postgres:5432/ethan
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python kernel/bootstrap.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  module-executive:
    build:
      context: .
      dockerfile: deploy/Dockerfile.kernel
    container_name: ethan-module-executive
    environment:
      NATS_URL: nats://nats:4222
      MODULE_ID: executive-v1
      LOG_LEVEL: INFO
    depends_on:
      nats:
        condition: service_healthy
    command: python modules/executive/main.py

  module-planner:
    build:
      context: .
      dockerfile: deploy/Dockerfile.kernel
    container_name: ethan-module-planner
    environment:
      NATS_URL: nats://nats:4222
      MODULE_ID: planner-v1
      LOG_LEVEL: INFO
    depends_on:
      nats:
        condition: service_healthy
    command: python modules/planner/main.py

  module-memory:
    build:
      context: .
      dockerfile: deploy/Dockerfile.kernel
    container_name: ethan-module-memory
    environment:
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379/0
      MODULE_ID: memory-v1
      LOG_LEVEL: INFO
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python modules/memory/main.py

  module-reflective:
    build:
      context: .
      dockerfile: deploy/Dockerfile.kernel
    container_name: ethan-module-reflective
    environment:
      NATS_URL: nats://nats:4222
      MODULE_ID: reflective-v1
      LOG_LEVEL: INFO
    depends_on:
      nats:
        condition: service_healthy
    command: python modules/reflective/main.py

volumes:
  postgres_data:
  redis_data: