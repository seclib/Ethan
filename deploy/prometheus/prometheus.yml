global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ethan-kernel'
    static_configs:
      - targets: ['kernel:9090']
        labels:
          service: cognitive-kernel

  - job_name: 'ethan-api'
    static_configs:
      - targets: ['api:8000']
        labels:
          service: api-gateway

  - job_name: 'nats'
    static_configs:
      - targets: ['nats:8222']
        labels:
          service: nats