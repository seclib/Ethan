# =============================================================================
# Traefik — Configuration Principale
# =============================================================================
# Documentation: https://doc.traefik.io/traefik/

# API & Dashboard
api:
  dashboard: true
  insecure: true  # Dashboard accessible sans auth (dev uniquement)

# Entrypoints (ports d'entrée)
entryPoints:
  web:
    address: ":80"
    # Redirect HTTP → HTTPS en production
    # http:
    #   redirections:
    #     entryPoint:
    #       to: web-secure
    #       scheme: https

  web-secure:
    address: ":443"

  traefik:
    address: ":8080"

# Providers
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false  # Services non exposés par défaut
    network: jarvis-network
  file:
    directory: /etc/traefik/dynamic
    watch: true

# Logs
log:
  level: INFO
  format: json

# Access Logs
accessLog:
  format: json
  bufferingSize: 100

# Metrics (Prometheus)
metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
    entryPoint: traefik

# Let's Encrypt (production)
certificatesResolvers:
  letsencrypt:
    acme:
      email: ${TRAEFIK_ACME_EMAIL}
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

# Ping (healthcheck)
ping:
  entryPoint: traefik